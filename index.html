<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketFlow</title>
  <link rel="icon" type="image/svg+xml" href="assets/pocketflow-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles/tokens.css" />
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>
<div id="tinyflow" class="tinyflow">

  <!-- ── Header ─────────────────────────── -->
  <header class="tf-header">
    <div class="tf-brand" id="drag-handle" role="button" aria-label="trascina widget">
      <span class="traffic" aria-label="controlli finestra">
        <button id="win-close" class="traffic-btn red" aria-label="chiudi"></button>
        <button id="win-min"   class="traffic-btn yellow" aria-label="minimizza"></button>
      </span>
      <div class="titles">
        <p class="eyebrow">Mini Widget</p>
        <h1>PocketFlow</h1>
      </div>
    </div>

    <div class="header-tools">
      <!-- Tab icons -->
      <nav class="tab-icons" role="tablist" aria-label="modalita">
        <button class="tab-icon is-active" data-tab="timer" role="tab" aria-label="Timer" title="Timer">
          <!-- Clock -->
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="9" r="5.5" stroke="currentColor" stroke-width="1.35"/>
            <path d="M8 6.5V9.3l1.8 1.2" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6.2 2.5h3.6" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="tab-icon" data-tab="todo" role="tab" aria-label="Tasks" title="Tasks">
          <!-- Checklist -->
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="3"   cy="5"  r="1.15" fill="currentColor"/>
            <path d="M6.5 5H13"  stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
            <circle cx="3"   cy="9"  r="1.15" fill="currentColor"/>
            <path d="M6.5 9H13"  stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
            <circle cx="3"   cy="13" r="1.15" fill="currentColor"/>
            <path d="M6.5 13H10" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="tab-icon" data-tab="audio" role="tab" aria-label="Audio" title="Audio">
          <!-- Music note -->
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10.5 2.5L5.5 4.2V12" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="3.8"  cy="12.2" r="1.8" stroke="currentColor" stroke-width="1.35"/>
            <circle cx="8.8"  cy="11.2" r="1.8" stroke="currentColor" stroke-width="1.35"/>
          </svg>
        </button>
      </nav>

      <button id="win-pin" class="pin-btn is-active" aria-label="blocca widget" title="Fissa widget">
        <svg width="13" height="17" viewBox="0 0 13 17" fill="none" aria-hidden="true">
          <circle cx="6.5" cy="5.5" r="5" fill="currentColor"/>
          <circle cx="5"   cy="4"   r="1.6" fill="white" opacity="0.18"/>
          <path d="M6.5 10.5v6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Panels ─────────────────────────── -->
  <main>

    <!-- TIMER -->
    <section class="card timer panel is-active" data-panel="timer" aria-labelledby="timer-title" data-timer-state="idle">
      <div class="card-top">
        <div>
          <p class="label">Timer</p>
          <h2 id="timer-title">Focus</h2>
        </div>
        <div class="timer-config">
          <label for="custom-min">Minutes</label>
          <input id="custom-min" type="number" min="1" max="999" value="25" inputmode="numeric" />
        </div>
      </div>

      <div class="timer-meta">
        <div class="timer-state-pill" id="timer-state-pill">Ready</div>
        <div class="controls timer-controls" role="group" aria-label="timer controls">
          <button id="start-btn" class="primary icon-control" aria-label="Start timer" title="Start">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M4.5 3.2v7.6L10.4 7 4.5 3.2Z" fill="currentColor"/>
            </svg>
          </button>
          <button id="pause-btn" class="icon-control" aria-label="Pause timer" title="Pause">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M4.5 3h1.75v8H4.5V3Zm3.25 0H9.5v8H7.75V3Z" fill="currentColor"/>
            </svg>
          </button>
          <button id="reset-btn" class="ghost icon-control" aria-label="Reset timer" title="Reset">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M5.1 3.7A5.5 5.5 0 1 1 2.8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M5.2 1.9 5 4.8 2.1 4.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="timer-display-wrap">
        <div class="timer-display-orbit" aria-hidden="true"></div>
        <p class="timer-caption">Time left</p>
        <div class="timer-display" aria-live="polite">
          <span id="timer-mm">25</span><span class="colon">:</span><span id="timer-ss">00</span>
        </div>
      </div>

      <div class="timer-shortcuts">
        <span><kbd>Space</kbd> Play/Pause</span>
        <span><kbd>Cmd</kbd><kbd>R</kbd> Reset</span>
      </div>

      <div class="progress"><div id="progress-bar"></div></div>
    </section>

    <!-- TASKS -->
    <section class="card todo panel" data-panel="todo" aria-labelledby="todo-title">
      <div class="card-top">
        <div>
          <p class="label">To-Do</p>
          <h2 id="todo-title">Tasks</h2>
        </div>
        <div class="section-actions">
          <button id="add-task-btn" class="icon-btn icon-btn--accent" aria-label="Add task" title="Add task">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
          <button id="clear-done" class="icon-btn" title="Clear done" aria-label="Clear done">
            <svg width="13" height="14" viewBox="0 0 13 14" fill="none" aria-hidden="true">
              <path d="M1 3h11M4.5 3V2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M4 3l.6 8.5M9 3l-.6 8.5M2.5 3l.5 9a1 1 0 0 0 1 .9h5a1 1 0 0 0 1-.9l.5-9" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="todo-body">
        <ul id="todo-list" aria-live="polite"></ul>
      </div>

      <!-- Hidden bridge — used by Todo class -->
      <div aria-hidden="true" style="display:none">
        <select id="todo-priority">
          <option value="high">Alta</option>
          <option value="med" selected>Media</option>
          <option value="low">Bassa</option>
        </select>
        <input type="checkbox" id="todo-today" checked />
        <form id="todo-form" autocomplete="off">
          <input id="todo-input" type="text" />
        </form>
      </div>
    </section>

    <!-- AUDIO -->
    <section class="card audio panel" data-panel="audio" aria-labelledby="audio-title">
      <div class="card-top">
        <div>
          <p class="label">Focus</p>
          <h2 id="audio-title">Audio</h2>
        </div>
      </div>

      <div id="audio-body">
        <div class="audio-hero">
          <div class="eq eq--large" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
          <p class="audio-hero-label">Ambient engine</p>
        </div>

        <div class="player-controls">
          <button id="play-btn" class="audio-play-btn" aria-label="Play audio" title="Play">
            <svg class="icon-play" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M4.5 3.2v7.6L10.4 7 4.5 3.2Z" fill="currentColor"/>
            </svg>
            <svg class="icon-pause" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M4.5 3h1.75v8H4.5V3Zm3.25 0H9.5v8H7.75V3Z" fill="currentColor"/>
            </svg>
          </button>
          <input id="volume" type="range" min="0" max="1" step="0.01" value="0.35" aria-label="volume" />
        </div>

        <label class="audio-toggle-card">
          <input type="checkbox" id="auto-pause" />
          <span class="audio-toggle-copy">
            <strong>Pause with timer</strong>
            <small>Stops ambient audio when focus ends</small>
          </span>
        </label>
        <label class="audio-toggle-card">
          <input type="checkbox" id="auto-play" />
          <span class="audio-toggle-copy">
            <strong>Autoplay on start</strong>
            <small>Starts ambient audio with the timer</small>
          </span>
        </label>
      </div>
    </section>

  </main>

  <!-- ── Task popup (bottom sheet) ─────── -->
  <div id="task-popup" class="task-popup" hidden role="dialog" aria-modal="true" aria-labelledby="task-popup-title">
    <div class="task-popup-sheet">
      <div class="task-popup-header">
        <p class="task-popup-title" id="task-popup-title">New Task</p>
        <button id="task-popup-close" class="popup-close-btn" aria-label="Chiudi">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <input id="task-popup-text" type="text" placeholder="What needs to be done?" autocomplete="off" />

      <div class="task-popup-meta">
        <!-- Priority dots -->
        <div class="prio-picker" role="group" aria-label="Priorità">
          <button class="prio-btn" data-prio="low"  aria-label="Bassa priorità" title="Bassa"></button>
          <button class="prio-btn is-selected" data-prio="med" aria-label="Media priorità" title="Media"></button>
          <button class="prio-btn" data-prio="high" aria-label="Alta priorità" title="Alta"></button>
        </div>
      </div>

      <button id="task-popup-submit" class="primary">Add Task</button>
    </div>
  </div>

  <!-- ── Confirm dialog ────────────────── -->
  <div id="confirm-dialog" class="task-popup" hidden role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="task-popup-sheet confirm-sheet">
      <p class="task-popup-title" id="confirm-title">Confirm</p>
      <p class="confirm-body" id="confirm-body"></p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="ghost">Cancel</button>
        <button id="confirm-ok" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

</div><!-- #tinyflow -->

<script type="module" src="src/scripts/main.js"></script>
</body>
</html>
